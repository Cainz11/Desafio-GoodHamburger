services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goodhamburger-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GoodHamburger@2026"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'GoodHamburger@2026' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mssql_data:
